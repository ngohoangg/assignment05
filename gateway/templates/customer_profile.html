{% extends 'base.html' %}

{% block title %}Thong tin customer - BookStore{% endblock %}

{% block extra_css %}
<style>
    .profile-wrap {
        max-width: 900px;
        margin: 0 auto;
    }

    .profile-card {
        padding: 22px;
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        background: #fff;
        box-shadow: var(--shadow-card);
    }

    .profile-card h2 {
        font-family: 'Fraunces', serif;
        font-size: 32px;
        margin-bottom: 8px;
    }

    .profile-card p {
        color: var(--ink-muted);
        margin-bottom: 18px;
    }

    .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
    }

    .field {
        display: grid;
        gap: 6px;
    }

    .field.full {
        grid-column: 1 / -1;
    }

    .field label {
        font-size: 13px;
        font-weight: 700;
    }

    .field input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 11px;
        font: inherit;
    }

    .field input:focus {
        outline: 2px solid #fed7aa;
        border-color: var(--accent);
    }

    .field input[readonly] {
        background: #f8f7f3;
        color: var(--ink-muted);
    }

    .actions {
        margin-top: 16px;
        display: flex;
        justify-content: flex-end;
    }

    @media (max-width: 820px) {
        .form-grid {
            grid-template-columns: 1fr;
        }
    }
</style>
{% endblock %}

{% block content %}
<section class="profile-wrap">
    <div class="profile-card">
        <h2>Thong tin customer</h2>
        <p>Cap nhat ten va dia chi giao hang cua ban.</p>

        <form method="post" action="{% url 'customer_profile' %}">
            {% csrf_token %}
            <div class="form-grid">
                <div class="field full">
                    <label for="name">Ho va ten</label>
                    <input type="text" id="name" name="name" value="{{ profile.name }}" required>
                </div>
                <div class="field full">
                    <label for="email">Email (tai khoan)</label>
                    <input type="email" id="email" value="{{ profile.email }}" readonly>
                </div>
                <div class="field full">
                    <label for="line1">Dia chi - Line 1</label>
                    <input type="text" id="line1" name="line1" value="{{ profile.address.line1 }}">
                </div>
                <div class="field full">
                    <label for="line2">Dia chi - Line 2</label>
                    <input type="text" id="line2" name="line2" value="{{ profile.address.line2 }}">
                </div>
                <div class="field">
                    <label for="city">Thanh pho</label>
                    <input type="text" id="city" name="city" value="{{ profile.address.city }}">
                </div>
                <div class="field">
                    <label for="state">Tinh/Bang</label>
                    <input type="text" id="state" name="state" value="{{ profile.address.state }}">
                </div>
                <div class="field">
                    <label for="postal_code">Ma buu chinh</label>
                    <input type="text" id="postal_code" name="postal_code" value="{{ profile.address.postal_code }}">
                </div>
                <div class="field">
                    <label for="country">Quoc gia</label>
                    <input type="text" id="country" name="country" value="{{ profile.address.country }}">
                </div>
            </div>

            <div class="actions">
                <button type="submit" class="btn">Luu thong tin</button>
            </div>
        </form>
    </div>
</section>
{% endblock %}
